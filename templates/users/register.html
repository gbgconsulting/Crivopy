{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-gray-950 flex items-center justify-center p-6 relative overflow-hidden">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-indigo-600/10 rounded-full blur-[100px]"></div>

    <div class="w-full max-w-md bg-gray-900/50 backdrop-blur-xl border border-gray-800 p-8 rounded-2xl shadow-2xl relative z-10">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Crivopy</h2>
            <p class="text-gray-400 mt-2">Crie sua conta e comece a analisar</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-rose-500 text-xs mt-1">{{ field.errors|first }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-bold rounded-xl transition-all shadow-lg shadow-indigo-500/20 transform active:scale-[0.98]">
                Criar Conta
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-400">
            Já tem uma conta? 
            <a href="{% url 'login' %}" class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors">Entrar</a>
        </p>
    </div>
</div>
{% endblock %}
