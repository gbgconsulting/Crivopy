{% extends 'base_authenticated.html' %}

{% block content %}
<div class='max-w-md mx-auto py-20 animate-fade-in'>
    <div class='bg-[#111114] border border-red-500/20 p-8 rounded-3xl text-center shadow-2xl'>
        <div class='w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center text-red-500 mx-auto mb-6'>
            <i data-lucide='alert-triangle' class='w-10 h-10'></i>
        </div>
        
        <h1 class='text-2xl font-bold text-white mb-2'>Excluir Candidato?</h1>
        <p class='text-gray-400 text-sm mb-8'>
            Você está prestes a remover <strong>{{ object.candidate_name }}</strong>. Esta ação não pode ser desfeita e o arquivo PDF será removido permanentemente.
        </p>

        <form method='post' class='flex flex-col gap-3'>
            {% csrf_token %}
            <button type='submit' class='w-full py-4 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition-all'>
                Sim, Excluir Registro
            </button>
            <a href="{% url 'document-list' object.job.pk %}" class='w-full py-4 bg-white/5 text-white font-bold rounded-xl hover:bg-white/10 transition-all'>
                Cancelar e Voltar
            </a>
        </form>
    </div>
</div>
{% endblock %}
