{% extends 'base_authenticated.html' %}

{% block content %}
<div class='max-w-lg mx-auto py-10 animate-fade-in'>
    <div class='bg-[#111114]/80 border border-white/5 p-8 rounded-3xl backdrop-blur-md shadow-xl'>
        <div class='mb-6'>
            <h1 class='text-2xl font-bold text-white'>Alterar Status</h1>
            <p class='text-gray-400 text-sm'>Candidato: <span class='text-indigo-400'>{{ object.candidate_name }}</span></p>
        </div>

        <form method='post' class='space-y-6'>
            {% csrf_token %}
            <div class='space-y-2'>
                <label class='text-sm font-semibold text-gray-400'>Novo Estado</label>
                {{ form.status }}
            </div>

            <div class='flex flex-col gap-3'>
                <button type='submit' class='w-full py-4 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-bold rounded-xl hover:shadow-lg transition-all'>
                    Atualizar Candidato
                </button>
                <a href="{% url 'document-list' object.job.pk %}" class='w-full py-4 text-center text-gray-400 hover:text-white transition-all text-sm font-medium'>
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
