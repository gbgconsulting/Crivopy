<div x-show='sidebarOpen' 
     @click='sidebarOpen = false' 
     x-transition:enter='transition ease-out duration-300'
     x-transition:enter-start='opacity-0'
     x-transition:enter-end='opacity-100'
     class='fixed inset-0 bg-black/60 backdrop-blur-sm z-40 md:hidden'>
</div>

<aside :class='sidebarOpen ? "translate-x-0" : "-translate-x-full"'
       class='fixed inset-y-0 left-0 w-72 bg-[#111114] border-r border-white/5 z-50 transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 flex flex-col'>
    
    <div class='p-8 flex items-center gap-3'>
        <div class='w-10 h-10 bg-gradient-to-tr from-indigo-600 to-violet-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20'>
            <i data-lucide='brain-circuit' class='text-white w-6 h-6'></i>
        </div>
        <span class='text-2xl font-bold tracking-tight text-white'>Crivopy</span>
    </div>

    <nav class='flex-1 px-4 space-y-2 mt-4'>
        {% url 'hub:dashboard' as dash_url %}
        <a href='{{ dash_url }}' class='flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group {% if request.path == dash_url %}bg-indigo-600/10 text-indigo-400 border border-indigo-500/20{% else %}text-gray-400 hover:bg-white/5 hover:text-gray-100{% endif %}'>
            <i data-lucide='layout-dashboard' class='w-5 h-5'></i>
            <span class='font-medium'>Dashboard</span>
        </a>

        {% url 'hub:job-list' as jobs_url %}
        <a href='{{ jobs_url }}' class='flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group {% if jobs_url in request.path %}bg-indigo-600/10 text-indigo-400 border border-indigo-500/20{% else %}text-gray-400 hover:bg-white/5 hover:text-gray-100{% endif %}'>
            <i data-lucide='briefcase' class='w-5 h-5'></i>
            <span class='font-medium'>Vagas</span>
        </a>

        <a href='{{jobs_url}}' class='flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 cursor-not-allowed opacity-60'>
            <i data-lucide='files' class='w-5 h-5'></i>
            <span class='font-medium'>Documentos</span>
        </a>

        <a href='{{jobs_url}}' class='flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 cursor-not-allowed opacity-60'>
            <i data-lucide='bar-chart-3' class='w-5 h-5'></i>
            <span class='font-medium'>Análises</span>
        </a>
    </nav>

    <div class='p-4 border-t border-white/5 bg-[#0a0a0c]/50'>
        <div class='flex items-center gap-3 px-4 py-3 mb-2'>
            <div class='w-10 h-10 rounded-full bg-gradient-to-b from-gray-700 to-gray-800 flex items-center justify-center border border-white/10'>
                <span class='text-xs font-bold text-indigo-400'>
                    {{ user.first_name|default:user.email|first|upper }}
                </span>
            </div>
            <div class='flex flex-col min-w-0'>
                <span class='text-sm font-semibold text-white truncate'>{{ user.get_full_name|default:user.email }}</span>
                <span class='text-xs text-gray-500 truncate'>{{ user.email }}</span>
            </div>
        </div>

        <form action="{% url 'logout' %}" method="post" class='w-full'>
            {% csrf_token %}
            <button type='submit' class='w-full flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-red-400 hover:bg-red-500/5 rounded-xl transition-all duration-200'>
                <i data-lucide='log-out' class='w-5 h-5'></i>
                <span class='font-medium text-sm'>Sair do Sistema</span>
            </button>
        </form>
    </div>
</aside>
