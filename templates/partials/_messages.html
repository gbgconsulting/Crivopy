<!-- templates/partials/_messages.html -->
{% if messages %}
<div class="fixed top-4 right-4 z-50 flex flex-col gap-2">
    {% for message in messages %}
    <div class="px-6 py-3 rounded-lg border shadow-lg transition-all duration-300 {% if message.tags == 'success' %} bg-emerald-950/80 border-emerald-500 text-emerald-200 {% else %} bg-rose-950/80 border-rose-500 text-rose-200 {% endif %} backdrop-blur-md">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
